  .wk-banner__range-eyebrow { font-size:10px; text-transform:uppercase; letter-spacing:0.22em; color:var(--terracotta); font-weight:600; margin-bottom:4px; }
  .wk-banner__range { font-family:var(--display); font-size:32px; font-weight:300; line-height:1; color:var(--ink); }
  .wk-banner__range-sub { font-size:12px; color:var(--ink-muted); margin-top:6px; font-style:italic; }
  .wk-banner__metrics { display:grid; grid-template-columns:repeat(4, 1fr); border-left:1px solid var(--hairline-soft); padding-left:32px; gap:0; }
  .wk-banner__metrics .m-metric { padding-right:16px; }
  .wk-banner__metrics .m-metric + .m-metric { border-left:1px solid var(--hairline-soft); padding-left:16px; }

  /* Day strip */
  .wk-days { display:grid; grid-template-columns:repeat(5, 1fr); gap:10px; }
  .wk-day { background:var(--surface); border:1px solid var(--hairline-soft); border-radius:12px; padding:14px 14px 12px; cursor:pointer; transition:all 0.15s; text-align:left; }
  .wk-day:hover { border-color:var(--terracotta); transform:translateY(-1px); }
  .wk-day.is-today { background:color-mix(in oklab, var(--terracotta) 7%, var(--surface)); border-color:color-mix(in oklab, var(--terracotta) 30%, var(--hairline)); }
  .wk-day.is-open { background:color-mix(in oklab, var(--terracotta) 10%, var(--surface)); border-color:var(--terracotta); box-shadow:0 4px 14px -8px rgba(0,0,0,0.18); }
  .wk-day__head { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:8px; }
  .wk-day__name { font-size:10px; text-transform:uppercase; letter-spacing:0.18em; color:var(--ink-muted); font-weight:600; }
  .wk-day__num { font-family:var(--display); font-size:22px; font-weight:300; color:var(--ink); }
  .wk-day__count { font-family:var(--mono); font-size:10px; color:var(--ink-muted); }
  .wk-day__items { font-size:11.5px; color:var(--ink-2); line-height:1.45; }
  .wk-day__items > div { padding:3px 0; border-top:1px dashed var(--hairline-soft); }
  .wk-day__items > div:first-child { border-top:0; }

  /* Day expanded panel — appears below the day strip */
  .wk-dayexpand {
    background:var(--surface); border:1px solid var(--terracotta); border-radius:12px;
    overflow:hidden; animation:detail-in 0.2s ease-out;
  }
  .wk-dayexpand__head {
    padding:14px 22px; display:flex; align-items:baseline; justify-content:space-between;
    border-bottom:1px solid var(--hairline-soft);
    background:color-mix(in oklab, var(--terracotta) 5%, var(--surface));
  }
  .wk-dayexpand__h { font-family:var(--display); font-size:18px; font-weight:500; color:var(--ink); }
  .wk-dayexpand__sub { font-size:11px; text-transform:uppercase; letter-spacing:0.14em; color:var(--ink-muted); }
  .wk-dayexpand__close { font-family:var(--mono); font-size:18px; color:var(--ink-muted); padding:4px 8px; line-height:1; }
  .wk-dayexpand__close:hover { color:var(--terracotta); }

  /* Generic expandable row used across multiple sections */
  .xrow { border-top:1px solid var(--hairline-soft); }
  .xrow:first-of-type { border-top:0; }
  .xrow__head {
    width:100%; display:grid; align-items:start; gap:12px;
    padding:12px 18px; cursor:pointer; text-align:left; background:none; border:0;
    font-family:inherit; color:inherit;
    transition:background 0.12s;
  }
  .xrow__head:hover { background:rgba(0,0,0,0.025); }
  .xrow.is-open .xrow__head { background:color-mix(in oklab, var(--terracotta) 5%, var(--surface)); }

  /* Variants of xrow grid */
  .xrow--day .xrow__head      { grid-template-columns:auto 1fr auto auto; }
  .xrow--p0 .xrow__head       { grid-template-columns:18px auto 1fr auto auto; }
  .xrow--planning .xrow__head { grid-template-columns:18px 80px 1fr auto auto; }
  .xrow--follow .xrow__head   { grid-template-columns:18px 80px 1fr auto auto; }

  .xrow__check {
    width:18px; height:18px; border:1px solid var(--hairline);
    border-radius:50%; display:inline-flex; align-items:center; justify-content:center;
    color:transparent; transition:all 0.15s; margin-top:2px;
    background:transparent; cursor:pointer; padding:0;
  }
  .xrow__check:hover { border-color:var(--terracotta); }
  .xrow__check.is-done { background:var(--terracotta); border-color:var(--terracotta); color:#fff; }

  .xrow__dot { width:8px; height:8px; border-radius:50%; margin-top:7px; background:var(--ink-faint); }
  .xrow--p0 .xrow__dot { background:var(--terracotta); box-shadow:0 0 0 3px color-mix(in oklab, var(--terracotta) 18%, transparent); }

  .xrow__when {
    font-family:var(--mono); font-size:10.5px; color:var(--ink-muted);
    font-variant-numeric:tabular-nums; padding-top:3px; text-transform:uppercase; letter-spacing:0.06em;
  }
  .xrow.is-overdue .xrow__when { color:var(--terracotta); font-weight:500; }

  .xrow__title {
    font-family:var(--display); font-size:14px; font-weight:500; color:var(--ink); line-height:1.35;
  }
  .xrow.is-done .xrow__title { text-decoration:line-through; color:var(--ink-muted); }
  .xrow__sub-inline {
    font-size:11.5px; color:var(--ink-muted); line-height:1.5; margin-top:3px;
  }
  .xrow__badges { display:flex; flex-wrap:wrap; gap:4px; justify-content:flex-end; max-width:200px; padding-top:2px; }
  .xrow__chev {
    font-family:var(--mono); font-size:14px; color:var(--ink-faint); width:14px; text-align:center;
    padding-top:3px;
  }
  .xrow.is-open .xrow__chev { color:var(--terracotta); transform:rotate(90deg); }

  .xrow__detail {
    padding:4px 22px 18px 22px;
    background:color-mix(in oklab, var(--terracotta) 4%, var(--surface));
    animation:detail-in 0.18s ease-out;
  }
  .xrow__detail-h {
    font-size:9.5px; text-transform:uppercase; letter-spacing:0.18em;
    color:var(--terracotta); font-weight:600; margin:10px 0 4px;
  }
  .xrow__detail-h:first-child { margin-top:0; }
  .xrow__detail-body { font-size:12.5px; line-height:1.55; color:var(--ink-2); font-weight:300; text-wrap:pretty; margin:0; }
  .xrow__actions { display:flex; gap:6px; flex-wrap:wrap; margin-top:12px; }

  /* Scrollable card body */
  .scroll-body { max-height:380px; overflow-y:auto; scrollbar-width:thin; scrollbar-color:var(--hairline) transparent; }
  .scroll-body::-webkit-scrollbar { width:6px; }
  .scroll-body::-webkit-scrollbar-thumb { background:var(--hairline); border-radius:3px; }
  .scroll-body::-webkit-scrollbar-track { background:transparent; }

  /* Pull body padding back into the rows when xrow is used */
  .m1-block__body--rows { padding:0; }
  .m1-block__body--rows.scroll-body { padding-right:0; }

  /* Two-col grid */
  .pg-2col { display:grid; grid-template-columns:1fr 1fr; gap:18px; }
  .pg-2col > * { min-width:0; }
  @media (max-width:900px) { .pg-2col { grid-template-columns:1fr; } }

  /* Shipped filters + list */
  .sh-toolbar {
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:0 18px 14px; flex-wrap:wrap;
  }
  .sh-filters { display:inline-flex; gap:2px; background:rgba(0,0,0,0.05); border-radius:6px; padding:3px; }
  .sh-filter {
    padding:5px 12px; border-radius:4px; font-size:11.5px; font-weight:500; color:var(--ink-muted);
    transition:all 0.15s; display:inline-flex; align-items:center; gap:6px;
  }
  .sh-filter:hover { color:var(--ink-2); }
  .sh-filter.is-active { background:var(--surface); color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,0.04); }
  .sh-filter__count { font-family:var(--mono); font-size:9.5px; padding:1px 6px; border-radius:999px; background:rgba(0,0,0,0.06); color:var(--ink-muted); }
  .sh-filter.is-active .sh-filter__count { background:var(--bg-deep); color:var(--ink-2); }

  .sh-list { display:grid; grid-template-columns:1fr 1fr; gap:8px; padding:0 18px 18px; }
  @media (max-width:900px) { .sh-list { grid-template-columns:1fr; } }
  .sh-item {
    display:grid; grid-template-columns:18px 1fr auto; gap:10px; align-items:start;
    padding:10px 14px; background:rgba(255,255,255,0.55); border:1px solid var(--hairline-soft);
    border-radius:6px; font-size:12.5px; color:var(--ink-2); text-decoration:none;
    transition:all 0.12s;
  }
  .sh-item:hover { background:#fff; border-color:var(--sage); transform:translateY(-1px); }
  .sh-item__check {
    width:14px; height:14px; border-radius:50%; background:var(--sage); color:#fff;
    display:inline-flex; align-items:center; justify-content:center; margin-top:2px;
    font-size:9px; line-height:1;
  }
  .sh-item__title { font-family:var(--display); font-size:13.5px; font-weight:500; color:var(--ink); margin-bottom:2px; }
  .sh-item__meta { font-size:11px; color:var(--ink-muted); }
  .sh-item__tag { font-family:var(--mono); font-size:9.5px; padding:2px 6px; border-radius:3px; text-transform:uppercase; letter-spacing:0.1em; align-self:flex-start; }
  .sh-item__tag--important { background:color-mix(in oklab, var(--persimmon) 22%, transparent); color:var(--persimmon); }
  .sh-item__tag--os { background:color-mix(in oklab, var(--sage) 22%, transparent); color:var(--sage); }

  /* Followup buckets */
  .fu-bucket { background:var(--surface); border:1px solid var(--hairline-soft); border-radius:12px; overflow:hidden; }
  .fu-bucket--urgent { background:color-mix(in oklab, var(--terracotta) 7%, var(--surface)); border-color:color-mix(in oklab, var(--terracotta) 22%, var(--hairline)); }
  .fu-bucket--soon   { background:color-mix(in oklab, var(--mustard) 7%, var(--surface));   border-color:color-mix(in oklab, var(--mustard) 22%, var(--hairline)); }
  .fu-bucket--later  { background:color-mix(in oklab, var(--sage) 6%, var(--surface));     border-color:color-mix(in oklab, var(--sage) 18%, var(--hairline)); }
  .fu-bucket__head {
    width:100%; display:flex; align-items:baseline; justify-content:space-between;
    padding:14px 18px; border-bottom:1px solid var(--hairline-soft); cursor:pointer;
    background:none; border-left:0; border-right:0; border-top:0; text-align:left;
    font-family:inherit; color:inherit;
  }
  .fu-bucket__head h3 { font-family:var(--display); font-size:15px; font-weight:500; margin:0; color:var(--ink); }
  .fu-bucket__head-r { display:flex; align-items:center; gap:10px; }
  .fu-bucket__count { font-family:var(--mono); font-size:11px; color:var(--ink-muted); padding:2px 8px; background:rgba(255,255,255,0.5); border-radius:999px; }
  .fu-bucket__chev { font-family:var(--mono); font-size:18px; color:var(--ink-muted); width:18px; text-align:center; line-height:1; }
  .fu-bucket.is-collapsed .fu-bucket__head { border-bottom:0; }

  /* P0 & xrow-style colored borders for urgency in followups */
  .xrow--follow.is-urgent .xrow__head { background:color-mix(in oklab, var(--terracotta) 4%, transparent); }

  /* Q2 north star */
  .q2-northstar { background:linear-gradient(135deg, color-mix(in oklab, var(--terracotta) 9%, var(--surface)), color-mix(in oklab, var(--persimmon) 6%, var(--surface))); border:1px solid color-mix(in oklab, var(--terracotta) 22%, var(--hairline)); border-radius:14px; padding:28px 32px; }
  .q2-northstar__eye { font-size:10px; text-transform:uppercase; letter-spacing:0.22em; color:var(--terracotta); font-weight:600; margin-bottom:8px; }
  .q2-northstar__h { font-family:var(--display); font-size:30px; font-weight:300; line-height:1.15; color:var(--ink); margin-bottom:14px; }
  .q2-northstar__body { font-size:13.5px; color:var(--ink-2); line-height:1.6; max-width:760px; }

  /* Q2 glance grid — items are clickable */
  .q2-glance { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; }
  .q2-glance__col { background:var(--surface); border:1px solid var(--hairline-soft); border-radius:12px; overflow:hidden; }
  .q2-glance__col--sage      { background:color-mix(in oklab, var(--sage) 8%, var(--surface));      border-color:color-mix(in oklab, var(--sage) 22%, var(--hairline)); }
  .q2-glance__col--persimmon { background:color-mix(in oklab, var(--persimmon) 8%, var(--surface)); border-color:color-mix(in oklab, var(--persimmon) 22%, var(--hairline)); }
  .q2-glance__col--mustard   { background:color-mix(in oklab, var(--mustard) 8%, var(--surface));   border-color:color-mix(in oklab, var(--mustard) 22%, var(--hairline)); }
  .q2-glance__col--terracotta{ background:color-mix(in oklab, var(--terracotta) 8%, var(--surface)); border-color:color-mix(in oklab, var(--terracotta) 22%, var(--hairline)); }
  .q2-glance__head { padding:12px 14px; display:flex; align-items:center; justify-content:space-between; }
  .q2-glance__label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.16em; color:var(--ink-2); }
  .q2-glance__count { font-family:var(--mono); font-size:11px; color:var(--ink-muted); }
  .q2-glance__items { padding:0 8px 10px; display:flex; flex-direction:column; gap:2px; }
  .q2-glance__item {
    display:block; width:100%; text-align:left; background:none; border:0;
    padding:8px 10px; font-size:12px; color:var(--ink-2); line-height:1.5;
    border-radius:5px; cursor:pointer; transition:all 0.12s; font-family:inherit;
  }
  .q2-glance__item:hover { background:rgba(255,255,255,0.65); color:var(--ink); }
  .q2-glance__item.is-open { background:rgba(255,255,255,0.85); color:var(--ink); box-shadow:inset 0 0 0 1px var(--hairline-soft); }
  .q2-glance__detail {
    padding:8px 10px 10px; background:rgba(255,255,255,0.85);
    border-radius:5px; margin:2px 0;
    animation:detail-in 0.18s ease-out;
  }
  .q2-glance__detail-actions { display:flex; flex-direction:column; gap:4px; }
  .q2-glance__detail-actions .cta { justify-content:center; font-size:11px; padding:5px 10px; }
  @media (max-width:900px) { .q2-glance { grid-template-columns:1fr 1fr; } }

  /* Wins gallery (legacy grid — retained for any caller using .q2-wins without --rows) */
  .q2-wins { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .q2-win { background:var(--surface); border:1px solid var(--hairline-soft); border-radius:12px; padding:18px 20px; }
  .q2-win__title { font-family:var(--display); font-size:16px; font-weight:500; color:var(--ink); margin-bottom:8px; line-height:1.3; }
  .q2-win__body { font-size:12.5px; color:var(--ink-2); line-height:1.6; margin-bottom:12px; text-wrap:pretty; }
  @media (max-width:900px) { .q2-wins { grid-template-columns:1fr; } }

  /* Wins row layout — 3-col toggle rows, click to expand body + CTA */
  .q2-wins--rows { display:flex; flex-direction:column; gap:0; padding:6px 8px; }
  .q2-winrow { border-bottom:1px solid var(--hairline-soft); }
  .q2-winrow:last-child { border-bottom:0; }
  .q2-winrow__head {
    display:grid; grid-template-columns: 1fr 140px 110px 22px; gap:14px;
    width:100%; align-items:center; text-align:left;
    padding:11px 14px; background:transparent; border:0; cursor:pointer;
    font:inherit; color:inherit;
  }
  .q2-winrow__head:hover { background:rgba(0,0,0,0.025); }
  .q2-winrow.is-open .q2-winrow__head { background:rgba(0,0,0,0.04); }
  .q2-winrow__title { font-size:13.5px; color:var(--ink); font-weight:500; line-height:1.35; }
  .q2-winrow__pod { font-size:11px; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink-muted); }
  .q2-winrow__date { font-family:var(--mono); font-size:11px; color:var(--ink-muted); font-variant-numeric:tabular-nums; }
  .q2-winrow__chev { font-family:var(--mono); font-size:14px; color:var(--ink-muted); text-align:center; }
  .q2-winrow--head {
    display:grid; grid-template-columns: 1fr 140px 110px 22px; gap:14px;
    align-items:center; padding:11px 14px 8px;
    border-bottom:1px solid var(--hairline-soft);
  }
  .q2-winrow--head .q2-winrow__title,
  .q2-winrow--head .q2-winrow__pod,
  .q2-winrow--head .q2-winrow__date {
    font-size:10px; text-transform:uppercase; letter-spacing:0.14em; color:var(--ink-faint, var(--ink-muted)); font-weight:500;
  }
  @media (max-width:700px) {
    .q2-winrow--head { grid-template-columns: 1fr 80px 80px 22px; gap:10px; }
  }
  .q2-winrow__detail { padding:0 14px 14px 14px; border-top:1px solid var(--hairline-soft); background:var(--bg-tint); }
  .q2-winrow__body { font-size:12.5px; color:var(--ink-2); line-height:1.6; margin:10px 0 12px 0; text-wrap:pretty; }
  .q2-winrow__actions { display:flex; gap:8px; flex-wrap:wrap; }
  @media (max-width:700px) {
    .q2-winrow__head { grid-template-columns: 1fr 80px 80px 22px; gap:10px; }
  }

  /* Role panel */
  .q2-role { background:color-mix(in oklab, var(--plum) 6%, var(--surface)); border:1px solid color-mix(in oklab, var(--plum) 22%, var(--hairline)); border-radius:12px; padding:18px 22px; }
  .q2-role__title { font-family:var(--display); font-size:18px; font-weight:500; color:var(--ink); margin-bottom:2px; }
  .q2-role__meta { font-size:11px; text-transform:uppercase; letter-spacing:0.14em; color:var(--ink-muted); margin-bottom:10px; }
  .q2-role__detail { font-size:12.5px; color:var(--ink-2); line-height:1.6; margin-bottom:14px; }
  .q2-skills { display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; }
  .q2-skill__h { font-size:10px; text-transform:uppercase; letter-spacing:0.16em; color:var(--terracotta); font-weight:600; margin-bottom:4px; }
  .q2-skill__body { font-size:12px; color:var(--ink-2); line-height:1.5; }
  @media (max-width:900px) { .q2-skills { grid-template-columns:1fr 1fr; } }

  /* EmptyState — Connect <Tool> + All clear cards */
  .empty-state {
    border:1px dashed var(--hairline);
    border-radius:12px;
    padding:18px 22px;
    background:color-mix(in oklab, var(--surface) 96%, transparent);
    margin:8px 0;
  }
  .empty-state--connect { border-color:color-mix(in oklab, var(--terracotta) 35%, var(--hairline)); background:color-mix(in oklab, var(--terracotta) 4%, var(--surface)); }
  .empty-state__h { font-family:var(--display); font-size:14px; font-weight:500; color:var(--ink); margin-bottom:4px; }
  .empty-state__body { font-size:12.5px; color:var(--ink-2); line-height:1.55; margin:0; }
  .empty-state__hint { font-size:11px; color:var(--ink-muted); line-height:1.5; margin:6px 0 0; }
  .empty-state__hint code { font-family:var(--mono); font-size:11px; padding:1px 5px; border-radius:3px; background:color-mix(in oklab, var(--ink) 6%, transparent); }

  /* Smart-layer tags */
  .conf-tag { font-family:var(--mono); font-size:9.5px; letter-spacing:0.12em; text-transform:uppercase; padding:2px 6px; border-radius:3px; margin-left:6px; vertical-align:middle; }
  .conf-tag--high { background:color-mix(in oklab, var(--sage) 18%, transparent); color:var(--sage); }
  .conf-tag--med  { background:color-mix(in oklab, var(--mustard) 22%, transparent); color:var(--mustard); }
  .conf-tag--low  { background:color-mix(in oklab, var(--ink-muted) 18%, transparent); color:var(--ink-muted); }

  .status-change { display:inline-flex; align-items:center; gap:4px; font-family:var(--mono); font-size:10px; padding:2px 8px; border-radius:4px; background:color-mix(in oklab, var(--plum) 12%, transparent); color:var(--plum); margin-left:6px; }
  .status-change__prev { text-decoration:line-through; opacity:0.7; }
  .status-change__arrow { opacity:0.6; }
  .status-change__now { font-weight:600; }

  .moment-marker { display:inline-block; font-family:var(--mono); font-size:9.5px; letter-spacing:0.14em; text-transform:uppercase; padding:2px 7px; border-radius:3px; background:color-mix(in oklab, var(--sage) 14%, transparent); color:var(--sage); margin-left:6px; cursor:help; }

  /* Personal hero */
  .pp-hero { background:linear-gradient(135deg, color-mix(in oklab, var(--sage) 9%, var(--surface)), color-mix(in oklab, var(--mustard) 6%, var(--surface))); border:1px solid color-mix(in oklab, var(--sage) 22%, var(--hairline)); border-radius:14px; padding:24px 28px; }
  .pp-hero__eye { font-size:10px; text-transform:uppercase; letter-spacing:0.22em; color:var(--sage); font-weight:600; margin-bottom:6px; }
  .pp-hero__h { font-family:var(--display); font-size:24px; font-weight:400; color:var(--ink); margin-bottom:10px; }
  .pp-hero__row { display:grid; grid-template-columns:96px 1fr; gap:14px; padding:10px 0; border-top:1px solid color-mix(in oklab, var(--sage) 18%, var(--hairline-soft)); font-size:12.5px; color:var(--ink-2); line-height:1.55; }
  .pp-hero__row-label { font-size:10px; text-transform:uppercase; letter-spacing:0.16em; color:var(--ink-muted); font-weight:600; padding-top:2px; }
  .pp-hero__links { padding-top:14px; display:flex; gap:8px; }

  .pp-step { display:grid; grid-template-columns:auto auto 1fr auto; gap:14px; align-items:start; padding:14px 18px; border-bottom:1px solid var(--hairline-soft); }
  .pp-step:last-child { border-bottom:0; }
  .pp-step__when { font-family:var(--mono); font-size:10px; color:var(--ink-muted); text-transform:uppercase; letter-spacing:0.1em; padding-top:5px; min-width:90px; }

  `;
  const tag = document.createElement('style');
  tag.id = 'dash-pages-styles';
  tag.textContent = css;
  document.head.appendChild(tag);
})();

function ShippedThisWeek() {
  const [filter, setFilter] = useS('all');
  // Filter by shipped_date in current week (meta.weekStart .. meta.weekEnd inclusive).
  // Items missing shipped_date fall through to "earlier" and are excluded by default.
  const ws = D.meta.weekStart, we = D.meta.weekEnd;
  const inThisWeek = (d) => d && d >= ws && d <= we;
  const items = D.shipped.filter(i => inThisWeek(i.shipped_date));
  const earlierCount = D.shipped.length - items.length;
  const counts = {
    all: items.length,
    important: items.filter(i => SHIPPED_TAGS[i.id] === 'important').length,
    os: items.filter(i => SHIPPED_TAGS[i.id] === 'os').length,
  };
  const visible = filter === 'all' ? items : items.filter(i => SHIPPED_TAGS[i.id] === filter);
  return (
    <Block title="Shipped this week" sub={`${items.length} this week · ${earlierCount} earlier (Q2 page)`} color="schedule" count={items.length} bodyClass="m1-block__body--rows">
      <div className="sh-toolbar" style={{paddingTop:14}}>
        <div className="sh-filters">
          <button className={`sh-filter ${filter === 'all' ? 'is-active' : ''}`} onClick={() => setFilter('all')}>
            All <span className="sh-filter__count">{counts.all}</span>
          </button>
          <button className={`sh-filter ${filter === 'important' ? 'is-active' : ''}`} onClick={() => setFilter('important')}>
            Important <span className="sh-filter__count">{counts.important}</span>
          </button>
          <button className={`sh-filter ${filter === 'os' ? 'is-active' : ''}`} onClick={() => setFilter('os')}>
            Lifecycle OS tickets <span className="sh-filter__count">{counts.os}</span>
          </button>
        </div>
      </div>
      <div className="sh-list">
        {visible.length === 0 && <div style={{padding:'14px 18px', color:'var(--ink-muted)', fontStyle:'italic'}}>Nothing shipped yet this week. Earlier ships live on the Q2 page.</div>}
        {visible.map(item => {
          const tag = SHIPPED_TAGS[item.id];
          return (
            <a key={item.id} className="sh-item" href={item.href} target={item.href.startsWith('http') ? '_blank' : undefined} rel="noreferrer">
              <span className="sh-item__check">✓</span>
              <div>
                <div className="sh-item__title">{item.title}</div>
                <div className="sh-item__meta">{item.meta}</div>
              </div>
              {tag && <span className={`sh-item__tag sh-item__tag--${tag}`}>{tag === 'os' ? 'OS' : 'Important'}</span>}
            </a>
          );
        })}
      </div>
    </Block>
  );
}

function FollowupsPage({ state, cardProps }) {
  const [openFollow, setOpenFollow] = useS(null);
  const todayIds = new Set((D.meta && D.meta.todayFollowupIds) || []);
  const followIds = D.followups.map(c => c.id).filter(id => !state.dismissed[id]);
  const fBy = Object.fromEntries(D.followups.map(c => [c.id, c]));
  const buckets = { today: [], week: [], later: [] };
  followIds.forEach(id => {
    const item = fBy[id];
    if (todayIds.has(id)) { buckets.today.push(item); return; }
    const labels = (item.badges || []).map(b => (b.label || '').toLowerCase());
    if (labels.some(l => l === 'urgent' || l === 'today' || l === 'overdue' || l === 'p0')) buckets.today.push(item);
    else if (labels.some(l => l === 'this week')) buckets.week.push(item);
    else buckets.later.push(item);
  });
  const totalOpen = followIds.filter(i => !state.done[i]).length;
  return (
    <div className="pg-stack">
      <section className="wk-banner">
        <div>
          <div className="wk-banner__range-eyebrow">Follow-ups</div>
          <div className="wk-banner__range">{totalOpen} open</div>
          <div className="wk-banner__range-sub">checks here sync to the vault on next sweep</div>
        </div>
        <div className="wk-banner__metrics">
          <div className="m-metric m-metric--terracotta"><span className="m-metric__num">{buckets.today.length}</span><span className="m-metric__label">Today</span></div>
          <div className="m-metric m-metric--mustard"><span className="m-metric__num">{buckets.week.length}</span><span className="m-metric__label">This week</span></div>
          <div className="m-metric m-metric--sage"><span className="m-metric__num">{buckets.later.length}</span><span className="m-metric__label">Later</span></div>
        </div>
      </section>
      <div style={{padding:'0 0 18px'}}>
        <div className="pg-2col" style={{marginBottom:14}}>
          <FollowupBucket
            tone="urgent" label="Today"
            items={buckets.today}

            openId={openFollow} setOpenId={setOpenFollow}
          />
          <FollowupBucket

            items={buckets.week}

          items={buckets.later}
          state={state} onCheck={cardProps.onCheck} onNote={cardProps.onNote}
          openId={openFollow} setOpenId={setOpenFollow}
          collapsible defaultOpen={false}
        />
      </div>
    </div>
  );
}

// Glance items: each has a label and a CTA list
const GLANCE_ACTIONS = {
  // Populated by /daily-dash refresh from Notion + Obsidian + Slack links per work-item label.
  // Empty object renders "No links yet — add in Notion or Obsidian." for each glance item.
};

function GlanceItem({ label }) {
  const [open, setOpen] = useS(false);
  const actions = GLANCE_ACTIONS[label] || [];
  return (
    <>
      <button className={`q2-glance__item ${open ? 'is-open' : ''}`} onClick={() => setOpen(o => !o)}>

        <div className="q2-glance__detail">

                  <a key={i} className={`cta cta--${a.kind === 'slack' ? 'slack' : a.kind === 'notion' ? 'notion' : 'plum'}`} href={a.href}>

                  </a>

        </div>
      )}

}

function Q2WinRow({ win }) {
  const [open, setOpen] = useS(false);
  const links = (win.links && win.links.length > 0)
    ? win.links
    : (win.href ? [{ kind:'plum', label:'Open', href:win.href }] : []);
  return (
    <div className={`q2-winrow ${open ? 'is-open' : ''}`}>
      <button className="q2-winrow__head" onClick={() => setOpen(!open)}>
        <span className="q2-winrow__title">{win.title}</span>
        <span className="q2-winrow__pod">{win.pod || 'N/A'}</span>
        <span className="q2-winrow__date">{win.shipped_date || 'N/A'}</span>

        <div className="q2-winrow__detail">
          <p className="q2-winrow__body">{win.body}</p>
          {links.length > 0 && (
            <div className="q2-winrow__actions">
              {links.map((l, i) => {
                const cls = l.kind === 'slack' ? 'slack' : l.kind === 'notion' ? 'notion' : 'plum';

                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Q2Page() {
  const q = D.q2;

      <Block title="At a glance" sub={`${q.glance.reduce((n,c) => n + c.items.length, 0)} initiatives · click an item for links`} color="queue" count={q.glance.length}>
        <div className="q2-glance">

              <div className="q2-glance__head">

            <span className="q2-winrow__date">Shipped</span>
            <span className="q2-winrow__chev" aria-hidden></span>
          </div>
          {q.wins.map((w, i) => <Q2WinRow key={i} win={w} />)}

    </div>

}

<!-- ===== inlined: app.jsx (variant-state stripped) ===== -->
<script type="text/babel">
/* global React, ReactDOM, DAILY_DASH_DATA, TodayMockup1 */
/* global TweaksPanel, TweakSection, TweakRadio, useTweaks */
/* global WeekPage, Q2Page, PersonalPage */
const { useState, useEffect, useCallback } = React;
const D = window.DAILY_DASH_DATA;

// ============================================================
// PERSISTENCE
// ============================================================
const STORAGE_KEY = 'dear-me:state:v1';
const loadState = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; } };
const saveState = (s) => { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {} };

function useStateStore() {
  const [state, setState] = useState(() => {
    const s = loadState();
    return {
      done: s.done || {},
      dismissed: s.dismissed || {},
      orders: s.orders || {},
      boardMoves: s.boardMoves || {},
      notes: s.notes || {},        // { [cardId]: "free-text note picked up on next /daily-dash refresh" }
      notesTs: s.notesTs || {},    // { [cardId]: ISO timestamp of last edit }
    };
  });
  useEffect(() => {
    saveState(state);
    // Sync to local dashboard server when served over http(s) — file:// usage just falls back to localStorage.
    if (typeof window !== 'undefined'
        && window.location && (window.location.protocol === 'http:' || window.location.protocol === 'https:')) {
      try {
        fetch('/state', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(state),
          keepalive: true,
        }).catch(() => { /* server not running — fine, localStorage is authoritative */ });
      } catch (_) { /* noop */ }
    }
  }, [state]);
  return [state, setState];
}

// ============================================================
// HEADER — page tab routing
// ============================================================
const PAGES = [
  { id: 'today',     label: 'Today' },
  { id: 'week',      label: 'This Week' },
  { id: 'followups', label: 'Follow-Ups' },
  { id: 'q2',        label: 'Q2' },
];

function Header({ refreshedAt, activePage, onPage }) {
  const [staleLabel, setStaleLabel] = useState('');
  useEffect(() => {
    const ref = new Date(refreshedAt);
    const tick = () => {
      const mins = Math.floor((new Date() - ref) / 60000);
      let label;
      if (mins < 1) label = 'just now';
      else if (mins < 60) label = mins + 'm ago';
      else if (mins < 1440) label = Math.floor(mins/60) + 'h ago';
      else label = Math.floor(mins/1440) + 'd ago';
      setStaleLabel(label);
    };
    tick();
    const i = setInterval(tick, 30000);
    return () => clearInterval(i);
  }, [refreshedAt]);

  return (
    <header className="page-header">
      <div className="page-header__brand">
        <span className="brand-mark">∽</span>
        <span className="brand-name">Dear Alex,</span>
      </div>
      <nav className="page-header__nav">
        {PAGES.map(p => (
          <button key={p.id}
            className={`page-tab ${activePage === p.id ? 'is-active' : ''}`}
            onClick={() => onPage(p.id)}>
            {p.label}
          </button>
        ))}
      </nav>
      <div className="page-header__refresh">
        <button
          className="page-header__export"
          title="Download your dashboard interactions as JSON — drop into state/ so /daily-dash picks them up on next refresh. Useful when serving via file:// instead of localhost."
          onClick={() => {
            try {
              const raw = localStorage.getItem('dear-me:state:v1') || '{}';
              const stamp = new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
              const blob = new Blob([raw], { type: 'application/json' });
              const url = URL.createObjectURL(blob);
              const a = document.createElement('a');
              a.href = url;
              a.download = `dear-me-interactions-${stamp}.json`;
              document.body.appendChild(a);
              a.click();
              document.body.removeChild(a);
              URL.revokeObjectURL(url);
            } catch (_) { /* noop */ }
          }}>
          Export
        </button>
        <span className="dot dot--live" />
        <span>{staleLabel}</span>
      </div>
    </header>
  );
}

// ============================================================
// APP
// ============================================================
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "parchment",
  "type": "editorial",
  "density": "standard"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
  const [state, setState] = useStateStore();

  // Page routing — persisted. Guard against stale page ids (e.g. retired 'personal').
  const [activePage, setActivePage] = useState(() => {
    try {
      const p = localStorage.getItem('dear-me:page') || 'today';
      return PAGES.some(x => x.id === p) ? p : 'today';
    } catch { return 'today'; }
  });
  useEffect(() => { try { localStorage.setItem('dear-me:page', activePage); } catch {} }, [activePage]);

  useEffect(() => {
    const root = document.documentElement;
    root.dataset.palette = t.palette;
    root.dataset.type = t.type;
    root.dataset.density = t.density;
  }, [t.palette, t.type, t.density]);

  const handleCheck = useCallback((id) => {
    setState(s => ({ ...s, done: { ...s.done, [id]: !s.done[id] } }));
  }, [setState]);
  const handleDismiss = useCallback((id) => {
    setState(s => ({ ...s, dismissed: { ...s.dismissed, [id]: true } }));
  }, [setState]);
  const handleReorder = useCallback((key) => (newOrder) => {
    setState(s => ({ ...s, orders: { ...s.orders, [key]: newOrder } }));
  }, [setState]);
  // Per-card notes — toggleable textarea on any expanded card. Picked up on the next /daily-dash refresh.
  const handleNote = useCallback((id, v) => {
    setState(s => {
      const nextNotes = { ...(s.notes || {}) };
      const nextTs = { ...(s.notesTs || {}) };
      if (v == null || v === '') {
        delete nextNotes[id];
        delete nextTs[id];
      } else {
        nextNotes[id] = v;
        nextTs[id] = new Date().toISOString();
      }
      return { ...s, notes: nextNotes, notesTs: nextTs };
    });
  }, [setState]);

  const cardProps = { onCheck: handleCheck, onDismiss: handleDismiss, onNote: handleNote, notes: state.notes };

  const renderPage = () => {
    switch (activePage) {
      case 'today':
        return <window.TodayMockup1 state={state} setState={setState} cardProps={cardProps} onReorder={handleReorder} />;
      case 'week':
        return <window.WeekPage state={state} cardProps={cardProps} />;
      case 'q2':
        return <window.Q2Page />;
      case 'followups':
        return <window.FollowupsPage state={state} cardProps={cardProps} />;
      default:
        return null;
    }
  };

  return (
    <div className="page">
      <Header refreshedAt={D.meta.refreshedAt} activePage={activePage} onPage={setActivePage} />
      <main>{renderPage()}</main>

      <window.TweaksPanel title="Tweaks">
        <window.TweakSection label="Palette">
          <window.TweakRadio label="Mood" value={t.palette}
            options={[
              { value: 'parchment',  label: 'Parchment' },
              { value: 'apricot',    label: 'Apricot' },
              { value: 'persimmon',  label: 'Persimmon' },
              { value: 'mossbutter', label: 'Moss & butter' },
            ]}
            onChange={(v) => setTweak('palette', v)} />
        </window.TweakSection>
        <window.TweakSection label="Density">
          <window.TweakRadio label="Spacing" value={t.density}
            options={[
              { value: 'airy',     label: 'Airy' },
              { value: 'standard', label: 'Standard' },
              { value: 'compact',  label: 'Compact' },
            ]}
            onChange={(v) => setTweak('density', v)} />
        </window.TweakSection>
      </window.TweaksPanel>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
