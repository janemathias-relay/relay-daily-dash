<!doctype html>
<html lang="en" data-palette="parchment" data-type="editorial" data-density="standard">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alex — Daily Dash (Example)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Manrope:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  /* TOKENS ---------------------------------------------------- */
  :root {
    --bg:#f5eedc; --bg-deep:#ede2c8; --surface:#fdf9ef; --surface-2:#f9f1de;
    --hairline:#e0d2b3; --hairline-soft:#ecdfc7;
    --ink:#2a201a; --ink-2:#574531; --ink-muted:#9b8867; --ink-faint:#b8a98a;
    --terracotta:#b86643; --terracotta-2:#a85633; --terracotta-tint:#f0d9c8;
    --persimmon:#c98147; --persimmon-tint:#f3dfc6;
    --mustard:#a98c3a;   --mustard-tint:#ecdfb8;
    --sage:#7a8c6a;      --sage-tint:#d6dec8;
    --plum:#8a6b78;      --plum-tint:#e3d3d8;
    --olive:#8e8a52;     --olive-tint:#e2dcb8;
    --display:'Fraunces', serif;
    --sans:'Manrope', system-ui, sans-serif;
    --mono:'JetBrains Mono', ui-monospace, monospace;
    --space:24px; --space-sm:14px;
  }
  [data-palette="apricot"] {
    --bg:#f6e6d4;--bg-deep:#ecd5b9;--surface:#fdf5e9;--surface-2:#f5e4cc;
    --hairline:#e1c9a4;--hairline-soft:#ecd6b4;
    --ink:#3a261a;--ink-2:#6a4a31;--ink-muted:#a3855e;
    --terracotta:#c25a3d;--persimmon:#d68a4e;--mustard:#b6963d;--sage:#8aa07a;--plum:#9c7585;
  }
  [data-palette="persimmon"] {
    --bg:#efe1c9;--bg-deep:#e3d0b0;--surface:#fbf3df;--surface-2:#f0e1c2;
    --hairline:#d6bd92;--hairline-soft:#e3cea6;
    --ink:#2d1d12;--ink-2:#5e3f25;--ink-muted:#9c7b4d;
    --terracotta:#b04a25;--persimmon:#c97632;--mustard:#9a7820;--sage:#6e8556;--plum:#875968;
  }
  [data-palette="mossbutter"] {
    --bg:#f4eecf;--bg-deep:#e7df9d;--surface:#fbf6db;--surface-2:#f3edbf;
    --hairline:#d8c98a;--hairline-soft:#e3d6a4;
    --ink:#2a2912;--ink-2:#4f4a25;--ink-muted:#8a824f;
    --terracotta:#b25a37;--persimmon:#c98a3d;--mustard:#9c7a25;--sage:#6e8a4d;--plum:#8c6b7c;
  }
  [data-density="airy"]    { --space:32px; --space-sm:20px; }
  [data-density="compact"] { --space:18px; --space-sm:10px; }

  /* RESET ----------------------------------------------------- */
  *,*::before,*::after { box-sizing:border-box; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--ink); font-family:var(--sans); font-weight:300; line-height:1.55; -webkit-font-smoothing:antialiased; }
  body {
    background:
      radial-gradient(1200px 600px at 100% -100px, var(--bg-deep) 0%, transparent 60%),
      radial-gradient(800px 500px at -200px 30%, var(--surface-2) 0%, transparent 55%),
      var(--bg);
    min-height:100vh;
  }
  a { color:inherit; text-decoration:none; }
  button { background:none; border:0; padding:0; cursor:pointer; font-family:inherit; color:inherit; }

  .page { max-width:1180px; margin:0 auto; padding:32px 56px 80px; }
  @media (max-width:760px) { .page { padding:24px 22px 60px; } }

  /* HEADER ---------------------------------------------------- */
  .page-header {
    display:grid; grid-template-columns:auto 1fr auto; align-items:center;
    padding-bottom:18px; border-bottom:1px solid var(--hairline);
    margin-bottom:28px; column-gap:24px;
  }
  .page-header__brand { display:flex; align-items:baseline; gap:8px; color:var(--ink-2); }
  .brand-mark { font-family:var(--display); font-size:28px; font-weight:300; line-height:1; color:var(--terracotta); }
  .brand-name { font-family:var(--display); font-size:20px; font-weight:400; letter-spacing:0.02em; }
  .page-header__nav { display:flex; gap:28px; justify-content:flex-start; margin-left:32px; }
  .page-tab {
    font-family:var(--display); font-size:15px; font-weight:400;
    color:var(--ink-muted); padding:6px 0; position:relative;
  }
  .page-tab:not(:disabled):hover { color:var(--ink-2); }
  .page-tab.is-active { color:var(--ink); font-weight:500; }
  .page-tab.is-active::after {
    content:''; position:absolute; left:0; right:0; bottom:-19px; height:2px; background:var(--terracotta);
  }
  .page-tab:disabled { cursor:default; opacity:0.55; }
  .page-header__refresh {
    display:flex; align-items:center; justify-content:flex-end; gap:10px;
    font-size:11px; color:var(--ink-muted); text-transform:uppercase; letter-spacing:0.12em;
  }
  .page-header__export {
    font-family:var(--mono); font-size:10px; letter-spacing:0.1em; text-transform:uppercase;
    padding:5px 10px; border-radius:5px; cursor:pointer;
    background:var(--surface); color:var(--ink-muted);
    border:1px solid var(--hairline);
    transition:all 0.12s ease;
  }
  .page-header__export:hover { background:var(--bg-tint); color:var(--ink-2); border-color:var(--ink-muted); }
  .dot { width:6px; height:6px; border-radius:50%; display:inline-block; }
  .dot--live { background:var(--sage); animation:pulse 2.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.35 } }

  /* CTAs (solid) ---------------------------------------------- */
  .cta {
    display:inline-flex; align-items:center; gap:6px;
    font-family:var(--sans); font-size:11.5px; font-weight:500;
    padding:6px 12px; border-radius:4px; border:1px solid transparent;
    text-transform:none; letter-spacing:0.02em; line-height:1.2;
    transition:filter 0.12s, transform 0.06s;
  }
  .cta:hover { filter:brightness(1.06); }
  .cta:active { transform:translateY(1px); }
  .cta--primary  { background:var(--terracotta); color:#fff8ee; }
  .cta--obsidian { background:var(--plum);       color:#fbf3df; }
  .cta--plum     { background:var(--plum);       color:#fbf3df; }
  .cta--notion   { background:var(--mustard);    color:#fbf3df; }
  .cta--slack    { background:var(--sage);       color:#fbf3df; }
  .cta--ghost {
    background:transparent; border-color:var(--hairline); color:var(--ink-2);
    text-transform:uppercase; font-size:10.5px; letter-spacing:0.14em;
  }
  .cta--ghost:hover { border-color:var(--terracotta); color:var(--terracotta); }

  /* COLLAPSIBLE BLOCK ----------------------------------------- */
  .m1 { display:flex; flex-direction:column; gap:16px; }
  .m1-block {
    border:1px solid var(--hairline); border-radius:8px; overflow:hidden;
    background:var(--surface);
  }
  .m1-block--schedule { background:color-mix(in oklab, var(--persimmon) 7%, var(--surface)); border-color:color-mix(in oklab, var(--persimmon) 22%, var(--hairline)); }
  .m1-block--queue    { background:color-mix(in oklab, var(--sage) 8%, var(--surface));      border-color:color-mix(in oklab, var(--sage) 22%, var(--hairline)); }
  .m1-block--follow   { background:color-mix(in oklab, var(--mustard) 8%, var(--surface));   border-color:color-mix(in oklab, var(--mustard) 22%, var(--hairline)); }
  .m1-block--board    { background:color-mix(in oklab, var(--plum) 7%, var(--surface));      border-color:color-mix(in oklab, var(--plum) 22%, var(--hairline)); }
  .m1-block__head {
    width:100%; display:flex; align-items:center; justify-content:space-between; gap:14px;
    padding:14px 22px; text-align:left; transition:background 0.12s;
  }
  .m1-block__head:hover { background:rgba(0,0,0,0.025); }
  .m1-block.is-open .m1-block__head { border-bottom:1px solid var(--hairline-soft); }
  .m1-block__head-l { display:flex; align-items:baseline; gap:12px; }
  .m1-block__head h2 { font-family:var(--display); font-size:18px; font-weight:500; color:var(--ink); margin:0; }
  .m1-block__count { font-family:var(--mono); font-size:11px; color:var(--ink-muted); padding:2px 8px; background:rgba(255,255,255,0.5); border-radius:999px; }
  .m1-block__head-r { display:flex; align-items:center; gap:14px; }
  .m1-block__sub { font-size:10.5px; text-transform:uppercase; letter-spacing:0.14em; color:var(--ink-muted); font-weight:500; }
  .m1-block__chev { font-family:var(--mono); font-size:18px; color:var(--ink-muted); width:20px; text-align:center; line-height:1; }
  .m1-block__body { padding:18px 22px 20px; animation:detail-in 0.18s ease-out; }
  @keyframes detail-in { from { opacity:0; transform:translateY(-3px) } to { opacity:1; transform:none } }

  .m1-toolbar {
    display:flex; align-items:center; justify-content:space-between;
    gap:12px; margin-bottom:14px; flex-wrap:wrap;
  }

  /* PULSE CARD ------------------------------------------------ */
  .m-pulse {
    background:var(--surface); border:1px solid var(--hairline);
    border-radius:8px; overflow:hidden;
  }
  .m-pulse__top {
    display:grid; grid-template-columns:auto 1fr; gap:24px;
    align-items:center; padding:18px 24px;
  }
  .m-pulse__date {
    border-right:1px solid var(--hairline-soft); padding-right:24px;
  }
  .m-pulse__day {
    font-size:10px; text-transform:uppercase; letter-spacing:0.22em;
    color:var(--terracotta); font-weight:600; margin-bottom:4px;
  }
  .m-pulse__num {
    font-family:var(--display); font-size:34px; font-weight:300; line-height:1;
    color:var(--ink); letter-spacing:-0.01em;
  }
  .m-pulse__metrics {
    display:flex; align-items:flex-end; gap:18px; min-width:0; flex-wrap:wrap;
  }
  .m-metric {
    display:flex; flex-direction:column; gap:6px;
    align-items:flex-start; padding:0;
  }
  .m-metric + .m-metric { padding-left:18px; border-left:1px solid var(--hairline-soft); }
  .m-metric__num {
    font-family:var(--display); font-size:30px; font-weight:400; line-height:1;
    color:var(--ink); font-variant-numeric:tabular-nums;
  }
  .m-metric--terracotta .m-metric__num { color:var(--terracotta); }
  .m-metric--persimmon  .m-metric__num { color:var(--persimmon); }
  .m-metric--plum       .m-metric__num { color:var(--plum); }
  .m-metric--sage       .m-metric__num { color:var(--sage); }
  .m-metric--mustard    .m-metric__num { color:var(--mustard); }
  .m-metric__label {
    font-size:9.5px; text-transform:uppercase; letter-spacing:0.16em;
    color:var(--ink-muted); font-weight:500; line-height:1.3;
  }

  .m-pulse__read {
    background:color-mix(in oklab, var(--terracotta) 6%, var(--surface));
    border-top:1px solid color-mix(in oklab, var(--terracotta) 22%, var(--hairline));
    padding:0;
  }
  .m-pulse__read-head {
    display:flex; align-items:center; justify-content:space-between;
    width:100%; padding:12px 24px;
    background:transparent; border:0; cursor:pointer;
    text-align:left; color:inherit; font:inherit;
  }
  .m-pulse__read-head:hover { background:rgba(0,0,0,0.025); }
  .m-pulse__read-eyebrow {
    font-size:10px; text-transform:uppercase; letter-spacing:0.22em;
    color:var(--terracotta); font-weight:600;
  }
  .m-pulse__read-chev {
    font-size:14px; color:var(--terracotta); font-weight:500;
    transition:transform 0.15s; line-height:1;
  }
  .m-pulse__read-chev.is-open { transform:rotate(180deg); }
  .m-pulse__read-body {
    padding:2px 24px 16px;
    font-size:13px; line-height:1.55; color:var(--ink-2);
    font-weight:300; text-wrap:pretty;
  }
  .m-pulse__read-body p { margin:0 0 8px; }
  .m-pulse__read-list {
    margin:0; padding:0 0 0 22px;
    display:flex; flex-direction:column; gap:8px;
    font-size:13px; line-height:1.55; color:var(--ink-2); font-weight:300;
  }
  .m-pulse__read-list li::marker { color:var(--terracotta); font-weight:600; }

  /* SUBTABS --------------------------------------------------- */
  .m-subtabs {
    display:inline-flex; gap:2px; background:rgba(0,0,0,0.05);
    border-radius:6px; padding:3px;
  }
  .m-subtab {
    display:inline-flex; align-items:center; gap:6px;
    padding:6px 12px; border-radius:4px;
    font-size:11.5px; font-weight:500; color:var(--ink-muted);
    transition:all 0.15s;
  }
  .m-subtab:hover { color:var(--ink-2); }
  .m-subtab.is-active { background:var(--surface); color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,0.04); }
  .m-subtab__count {
    font-family:var(--mono); font-size:9.5px; padding:1px 6px;
    border-radius:999px; background:rgba(0,0,0,0.06); color:var(--ink-muted);
  }
  .m-subtab.is-active .m-subtab__count { background:var(--bg-deep); color:var(--ink-2); }

  /* DAY STREAM (mockup3-style) -------------------------------- */
  .m3-stream { display:flex; flex-direction:column; gap:14px; position:relative; }
  .m3-stream::before {
    content:''; position:absolute; left:80px; top:8px; bottom:8px;
    width:1px; background:var(--hairline-soft);
  }
  .m3-bucket { display:grid; grid-template-columns:80px 1fr; gap:16px; align-items:start; }
  .m3-bucket.is-collapsed .m3-bucket__body { display:none; }
  .m3-bucket__head {
    padding-top:8px; position:relative; z-index:1;
    background:none; border:0; cursor:pointer; text-align:left;
    display:flex; flex-direction:column; gap:2px;
  }
  .m3-bucket__head:hover .m3-bucket__label { filter:brightness(0.9); }
  .m3-bucket__hint {
    font-size:9.5px; text-transform:uppercase; letter-spacing:0.14em;
    color:var(--ink-faint); font-family:var(--mono);
  }
  .m3-bucket__head::after {
    content:''; position:absolute; top:14px; right:-4px;
    width:9px; height:9px; border-radius:50%;
    background:var(--ink-faint); border:2px solid var(--surface);
  }
  .m3-bucket--persimmon .m3-bucket__head::after { background:var(--persimmon); }
  .m3-bucket--mustard   .m3-bucket__head::after { background:var(--mustard); }
  .m3-bucket--plum      .m3-bucket__head::after { background:var(--plum); }
  .m3-bucket__label {
    font-family:var(--display); font-size:16px; font-weight:500; line-height:1;
  }
  .m3-bucket--persimmon .m3-bucket__label { color:var(--persimmon); }
  .m3-bucket--mustard   .m3-bucket__label { color:var(--mustard); }
  .m3-bucket--plum      .m3-bucket__label { color:var(--plum); }
  .m3-bucket__body {
    background:rgba(255,255,255,0.55);
    border:1px solid var(--hairline-soft);
    border-radius:5px;
    padding:2px 8px;
  }
  .m3-bucket__empty {
    padding:12px; text-align:center; font-size:11.5px;
    color:var(--ink-faint); font-style:italic;
  }

  /* AGENDA / EVENT (inline meta) ------------------------------ */
  .m-agenda { display:flex; flex-direction:column; gap:0; }
  .m-event { border-bottom:1px solid var(--hairline-soft); }
  .m-event:last-child { border-bottom:0; }
  .m-event__row {
    width:100%;
    display:grid; grid-template-columns:64px 4px 1fr 22px;
    column-gap:12px; padding:11px 6px; align-items:center;
    text-align:left; border-radius:3px;
  }
  .m-event__row:hover { background:rgba(0,0,0,0.025); }
  .m-event__time { display:flex; flex-direction:column; gap:1px; }
  .m-event__start {
    font-family:var(--mono); font-size:11.5px; color:var(--ink);
    font-weight:500; font-variant-numeric:tabular-nums;
  }
  .m-event__dur { font-size:10px; color:var(--ink-faint); font-family:var(--mono); }
  .m-event__bar { width:3px; align-self:stretch; min-height:32px; background:var(--ink-faint); border-radius:2px; }
  .m-event--persimmon  .m-event__bar { background:var(--persimmon); }
  .m-event--terracotta .m-event__bar { background:var(--terracotta); }
  .m-event--sage       .m-event__bar { background:var(--sage); }
  .m-event--plum       .m-event__bar { background:var(--plum); }
  .m-event--mustard    .m-event__bar { background:var(--mustard); }
  .m-event__line {
    min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .m-event__title {
    font-family:var(--display); font-size:14.5px; font-weight:500; color:var(--ink);
  }
  .m-event__inline-meta { font-family:var(--sans); font-size:12px; color:var(--ink-muted); font-weight:300; }
  .m-event__chev { color:var(--ink-faint); font-family:var(--mono); font-size:16px; text-align:center; }
  .m-event.is-open .m-event__chev { color:var(--terracotta); }
  .m-event.is-open .m-event__row { background:rgba(0,0,0,0.03); }
  .m-event__detail {
    padding:12px 16px 16px 84px;
    background:rgba(255,255,255,0.5);
    border-left:2px solid var(--terracotta);
    margin:0 6px 8px; border-radius:0 4px 4px 0;
    animation:detail-in 0.18s ease-out;
  }
  .m-event__summary { margin:0 0 12px; font-size:12.5px; line-height:1.55; color:var(--ink-2); font-weight:300; }
  .m-event__notes {
    padding:10px 12px; background:var(--surface);
    border:1px solid var(--hairline-soft); border-radius:3px; margin-bottom:12px;
  }
  .m-event__notes-h {
    font-size:9.5px; text-transform:uppercase; letter-spacing:0.18em;
    color:var(--terracotta); font-weight:600; margin-bottom:4px;
  }
  .m-event__notes p { margin:0; font-size:12.5px; line-height:1.5; color:var(--ink-2); font-weight:300; }
  .m-event__actions { display:flex; gap:6px; flex-wrap:wrap; }

  /* QUEUE LIST ------------------------------------------------ */
  .m-queuelist { display:flex; flex-direction:column; gap:6px; }
  .dlist { display:flex; flex-direction:column; gap:6px; }
  .dlist__row.is-dragging { opacity:0.4; }
  .dlist__row.is-over .m-card { border-top:2px solid var(--terracotta); }

  .m-card {
    background:rgba(255,255,255,0.55);
    border:1px solid var(--hairline-soft); border-radius:5px;
    transition:background 0.12s;
    overflow:hidden;
  }
  .m-card:hover { background:rgba(255,255,255,0.85); }
  .m-card.is-done { opacity:0.45; }
  .m-card.is-done .m-card__title { text-decoration:line-through; }
  .m-card__head {
    display:grid; grid-template-columns:24px 70px 1fr auto auto;
    column-gap:14px; align-items:center;
    padding:14px 16px;
    cursor:pointer; width:100%; background:transparent;
    border:0; text-align:left; color:inherit; font:inherit;
  }
  .m-card__head:hover { background:rgba(0,0,0,0.02); }
  .m-card__chev {
    font-size:14px; color:var(--ink-muted); font-weight:500;
    line-height:1; padding-left:6px;
    transition:transform 0.15s;
  }
  .m-card.is-open .m-card__chev { transform:rotate(180deg); color:var(--ink-2); }
  .m-card__detail {
    padding:0 16px 14px 108px;
    border-top:1px solid var(--hairline-soft);
    padding-top:12px; margin-top:0;
  }
  .m-card__detail .m-card__eyebrow { margin-bottom:6px; }
  .m-card__detail .m-card__sub { margin-bottom:0; }
  .m-card__detail .m-card__links { margin-top:10px; }

  .m-check {
    width:18px; height:18px; border:1px solid var(--hairline);
    border-radius:50%; display:inline-flex; align-items:center; justify-content:center;
    color:transparent; transition:all 0.15s; margin-top:2px;
    position:relative; z-index:2; cursor:pointer;
    background:transparent;
  }
  .m-check:hover { border-color:var(--terracotta); }
  .m-check.is-done { background:var(--terracotta); border-color:var(--terracotta); color:#fff; }

  .m-card__when {
    font-family:var(--mono); font-size:11px; color:var(--ink-muted);
    font-variant-numeric:tabular-nums;
  }
  .m-card__when-main { color:var(--ink-2); }
  .m-card__when-sub { color:var(--ink-faint); margin-top:2px; font-size:10px; }
  .m-card--overdue .m-card__when-main { color:var(--terracotta); font-weight:500; }
  .m-card--today .m-card__when-main { color:var(--persimmon); }

  .m-card__body { min-width:0; }
  .m-card__eyebrow { font-size:10px; text-transform:uppercase; letter-spacing:0.14em; color:var(--ink-muted); margin-bottom:4px; font-weight:500; }
  .m-card__title { font-family:var(--display); font-size:15px; font-weight:500; line-height:1.3; color:var(--ink); margin-bottom:4px; }
  .m-card__sub { font-size:12.5px; color:var(--ink-2); line-height:1.5; font-weight:300; text-wrap:pretty; }
  .m-card__links { display:flex; flex-wrap:wrap; gap:5px; margin-top:8px; }
  .m-card__meta { display:flex; flex-direction:column; align-items:flex-end; gap:4px; }
  .m-card__badges { display:flex; flex-wrap:wrap; gap:4px; justify-content:flex-end; max-width:180px; }

  /* FOLLOWUPS ------------------------------------------------- */
  /* The .m-follow row variant was removed when the xrow-based FollowupRow took over.
     Keeping: .m-followlist (Today wrapper) + .m-follow__badges (Personal page SendSight steps). */
  .m-followlist { display:flex; flex-direction:column; gap:6px; }
  .m-follow__badges { display:flex; gap:4px; flex-wrap:wrap; justify-content:flex-end; }

  /* BADGES ---------------------------------------------------- */
  .badge {
    display:inline-flex; align-items:center;
    font-size:9.5px; font-weight:500; text-transform:uppercase; letter-spacing:0.14em;
    padding:3px 9px; border-radius:999px; white-space:nowrap; line-height:1.4;
  }
  .badge--terracotta { background:var(--terracotta-tint); color:var(--terracotta-2); }
  .badge--persimmon  { background:var(--persimmon-tint);  color:var(--persimmon); }
  .badge--mustard    { background:var(--mustard-tint);    color:var(--mustard); }
  .badge--sage       { background:var(--sage-tint);       color:var(--sage); }
  .badge--plum       { background:var(--plum-tint);       color:var(--plum); }
  .badge--olive      { background:var(--olive-tint);      color:var(--olive); }
  .badge--overdue    { background:var(--terracotta);      color:#fff8ee; }

  /* KANBAN ---------------------------------------------------- */
  .m-kanban-toolbar { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; flex-wrap:wrap; }
  .m-kanban-toolbar__hidden { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .m-kanban-toolbar__hidden-h { font-size:10px; text-transform:uppercase; letter-spacing:0.14em; color:var(--ink-muted); }
  .m-kanban-scroll {
    overflow-x:auto; padding-bottom:8px;
    scrollbar-width:thin;
  }
  .m-kanban-scroll::-webkit-scrollbar { height:8px; }
  .m-kanban-scroll::-webkit-scrollbar-thumb { background:var(--hairline); border-radius:4px; }
  .m-kanban {
    display:flex; gap:10px; min-width:min-content;
  }
  .m-kcol {
    flex:0 0 calc((100% - 30px) / 4); min-width:200px; max-width:1fr;
    padding:10px 10px 12px;
    background:rgba(255,255,255,0.5);
    border:1px solid var(--hairline-soft);
    border-radius:6px;
    min-height:120px;
    transition:background 0.12s, border-color 0.12s;
  }
  .m-kcol--olive    { border-top:3px solid var(--olive); }
  .m-kcol--mustard  { border-top:3px solid var(--mustard); }
  .m-kcol--persimmon{ border-top:3px solid var(--persimmon); }
  .m-kcol--plum     { border-top:3px solid var(--plum); }
  .m-kcol--sage     { border-top:3px solid var(--sage); }
  .m-kcol--terracotta { border-top:3px solid var(--terracotta); }
  .m-kcol__hide { font-family:var(--mono); font-size:11px; color:var(--ink-faint); padding:0 4px; line-height:1; }
  .m-kcol__hide:hover { color:var(--terracotta); }
  .m-kcol-restore {
    display:inline-flex; align-items:center; gap:6px;
    padding:5px 10px; border:1px dashed var(--hairline); border-radius:4px;
    font-size:10.5px; text-transform:uppercase; letter-spacing:0.12em; color:var(--ink-muted);
  }
  .m-kcol-restore:hover { color:var(--terracotta); border-color:var(--terracotta); }
  .m-kcol.is-drop {
    background:color-mix(in oklab, var(--terracotta) 7%, var(--surface));
    border-color:var(--terracotta);
  }
  .m-kcol__head {
    display:flex; align-items:baseline; justify-content:space-between;
    padding:4px 4px 10px; border-bottom:1px solid var(--hairline-soft); margin-bottom:8px;
  }
  .m-kcol__label { font-family:var(--display); font-size:13px; font-weight:500; color:var(--ink); }
  .m-kcol__count { font-family:var(--mono); font-size:10px; color:var(--ink-muted); }
  .m-kcol__body { display:flex; flex-direction:column; gap:6px; }
  .m-kcol__empty { padding:12px 6px; font-size:11px; color:var(--ink-faint); text-align:center; font-style:italic; }
  .m-kcol__more {
    margin-top:6px; padding:6px 8px; font-size:10.5px; text-transform:uppercase;
    letter-spacing:0.14em; color:var(--ink-muted); border:1px dashed var(--hairline);
    border-radius:4px; text-align:center;
  }
  .m-kcol__more:hover { color:var(--terracotta); border-color:var(--terracotta); }

  .m-kcard {
    background:var(--surface); border:1px solid var(--hairline-soft); border-radius:5px;
    overflow:hidden; transition:box-shadow 0.12s, transform 0.06s;
  }
  .m-kcard--overdue {
    background:color-mix(in oklab, var(--terracotta) 14%, var(--surface));
    border-color:color-mix(in oklab, var(--terracotta) 38%, var(--hairline));
  }
  .m-kcard--today {
    background:color-mix(in oklab, var(--mustard) 18%, var(--surface));
    border-color:color-mix(in oklab, var(--mustard) 40%, var(--hairline));
  }
  .m-kcard:hover { box-shadow:0 2px 8px -4px rgba(0,0,0,0.18); }
  .m-kcard.is-dragging { opacity:0.5; transform:scale(0.98); }
  .m-kcard__head {
    width:100%; display:grid; grid-template-columns:14px 1fr 16px;
    column-gap:6px; align-items:center;
    padding:9px 10px; text-align:left; cursor:grab;
  }
  .m-kcard__head:active { cursor:grabbing; }
  .m-kcard__grip {
    color:var(--ink-faint); font-size:10px; line-height:1;
    letter-spacing:-2px; user-select:none;
  }
  .m-kcard__title {
    font-family:var(--display); font-size:13px; font-weight:500;
    color:var(--ink); line-height:1.3; text-wrap:pretty;
  }
  .m-kcard__chev {
    font-family:var(--mono); font-size:14px; color:var(--ink-faint); text-align:center;
  }
  .m-kcard.is-open .m-kcard__chev { color:var(--terracotta); }
  .m-kcard__detail {
    padding:8px 12px 12px; border-top:1px solid var(--hairline-soft);
    background:color-mix(in oklab, var(--surface-2) 50%, var(--surface));
    animation:detail-in 0.18s ease-out;
  }
  .m-kcard__eyebrow { font-size:9.5px; text-transform:uppercase; letter-spacing:0.14em; color:var(--ink-muted); margin-bottom:4px; font-weight:500; }
  .m-kcard__sub { margin:0 0 8px; font-size:12px; line-height:1.5; color:var(--ink-2); font-weight:300; }
  .m-kcard__read {
    background:color-mix(in oklab, var(--terracotta) 8%, var(--surface));
    border-left:2px solid var(--terracotta);
    padding:8px 10px; border-radius:0 4px 4px 0; margin-bottom:10px;
  }
  .m-kcard__read-h {
    font-size:9.5px; text-transform:uppercase; letter-spacing:0.18em;
    color:var(--terracotta); font-weight:600; margin-bottom:3px; display:block;
  }
  .m-kcard__read p { margin:0; font-size:12px; line-height:1.5; color:var(--ink-2); font-weight:300; }
  .m-kcard__links { display:flex; gap:5px; flex-wrap:wrap; }

  /* CARD NOTE — toggleable per-card note picked up on the next /daily-dash refresh */
  .m-cardnote { margin-top:10px; }
  .m-cardnote__toggle {
    background:none; border:1px dashed var(--hairline);
    color:var(--ink-muted); font-size:11px; font-weight:500;
    padding:5px 10px; border-radius:4px; cursor:pointer;
    display:inline-flex; align-items:center; gap:5px;
    transition:all 0.15s;
  }
  .m-cardnote__toggle:hover { border-color:var(--plum); color:var(--plum); }
  .m-cardnote__toggle.has-note { border-style:solid; border-color:var(--plum); color:var(--plum); background:color-mix(in oklab, var(--plum) 6%, var(--surface)); }
  .m-cardnote__dot { width:6px; height:6px; border-radius:50%; background:var(--plum); display:inline-block; }
  .m-cardnote__wrap {
    margin-top:8px; background:color-mix(in oklab, var(--plum) 6%, var(--surface));
    border-left:2px solid var(--plum); border-radius:0 4px 4px 0;
    padding:8px 10px;
  }
  .m-cardnote__label {
    font-size:9.5px; text-transform:uppercase; letter-spacing:0.18em;
    color:var(--plum); font-weight:600; margin-bottom:5px; display:block;
  }
  .m-cardnote__ta {
    width:100%; min-height:54px; padding:6px 8px; border-radius:3px;
    border:1px solid var(--hairline); background:var(--surface);
    font-family:var(--sans); font-size:12px; line-height:1.45; color:var(--ink);
    resize:vertical; box-sizing:border-box;
  }
  .m-cardnote__ta:focus { outline:none; border-color:var(--plum); }
  .m-cardnote__meta {
    display:flex; justify-content:space-between; align-items:center;
    margin-top:5px; font-size:10px; color:var(--ink-muted);
  }
  .m-cardnote__clear {
    background:none; border:none; color:var(--ink-muted); font-size:10px;
    cursor:pointer; padding:0; text-decoration:underline;
  }
  .m-cardnote__clear:hover { color:var(--terracotta); }

  /* VIEW MORE / EMPTY ----------------------------------------- */
  .m-empty {
    padding:30px 18px; text-align:center; color:var(--ink-faint);
    font-size:13px; font-style:italic;
    border:1px dashed var(--hairline-soft); border-radius:5px;
  }
  .m-viewmore { margin-top:10px; }

  /* RESPONSIVE ------------------------------------------------ */
  @media (max-width:1100px) {
    .m-kcol { flex:0 0 calc((100% - 20px) / 3); }
  }
  @media (max-width:900px) {
    .m-kcol { flex:0 0 calc((100% - 10px) / 2); }
    .m-pulse__top { grid-template-columns:1fr; }
    .m-pulse__date { border-right:0; padding-right:0; border-bottom:1px solid var(--hairline-soft); padding-bottom:14px; }
    .m-event__row { grid-template-columns:54px 4px 1fr 20px; }
    .m-event__detail { padding-left:16px; }
    .page-header { grid-template-columns:1fr 1fr; row-gap:10px; }
    .page-header__nav { grid-column:1/-1; justify-content:flex-start; flex-wrap:wrap; }
  }
  @media (max-width:640px) {
    .m-metric { padding:0 8px; }
    .m-metric__num { font-size:22px; }
    .m-card__head { grid-template-columns:24px 1fr auto auto; row-gap:8px; }
    .m-card__head .m-card__when, .m-card__head .m-card__meta { display:none; }
    .m-card__detail { padding-left:38px; }
    .m-follow__badges { display:none; }
    .m-kcol { flex:0 0 85%; }
  }
</style>
</head>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // Hide the toggle until the host has actually enabled the rail (the
  // __omelette_rail_enabled window message, posted only when the
  // omelette_deck_rail_enabled flag is on for this user). The initial read
  // covers TweaksPanel mounting after the message already arrived; the
  // listener covers the common case of mounting first.
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);

// ============================================================

    <span className="section-header__rule" />

  </div>
);

// ============================================================
// DRAGGABLE LIST — uses HTML5 drag-and-drop, persists order
// ============================================================

function DraggableList({ ids, onReorder, renderItem }) {
  const [dragIdx, setDragIdx] = useState(null);
  const [overIdx, setOverIdx] = useState(null);

  const handleDragStart = (i) => (e) => {
    setDragIdx(i);
    e.dataTransfer.effectAllowed = 'move';
    // empty image to keep card visible while dragging — browser default is fine; just ensure transfer payload exists
    try { e.dataTransfer.setData('text/plain', String(i)); } catch (_) {}
  };
  const handleDragOver = (i) => (e) => {
    e.preventDefault();
    if (i !== overIdx) setOverIdx(i);
  };
  const handleDragEnd = () => {
    if (dragIdx != null && overIdx != null && dragIdx !== overIdx) {
      const next = ids.slice();
      const [moved] = next.splice(dragIdx, 1);
      next.splice(overIdx, 0, moved);
      onReorder(next);
    }
    setDragIdx(null);
    setOverIdx(null);
  };

  return (
    <div className="dlist" onDragEnd={handleDragEnd}>
      {ids.map((id, i) => (
        <div
          key={id}
          className={`dlist__row ${dragIdx === i ? 'is-dragging' : ''} ${overIdx === i && dragIdx !== i ? 'is-over' : ''}`}
          draggable
          onDragStart={handleDragStart(i)}
          onDragOver={handleDragOver(i)}
        >
          {renderItem(id, i)}
        </div>
      ))}
    </div>
  );
}

// ============================================================
// QUICK ADD
// ============================================================

const QuickAdd = ({ onAdd, placeholder = 'Add a quick note for today…' }) => {
  const [val, setVal] = useState('');
  const [open, setOpen] = useState(false);
  const inputRef = useRef(null);

  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        setOpen(true);
        setTimeout(() => inputRef.current?.focus(), 50);
      }
      if (e.key === 'Escape') setOpen(false);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const submit = (e) => {
    e?.preventDefault();
    if (!val.trim()) return;
    onAdd(val.trim());
    setVal('');
    setOpen(false);
  };

  return (
    <div className={`quick-add ${open ? 'is-open' : ''}`}>
      {!open ? (
        <button className="quick-add__trigger" onClick={() => { setOpen(true); setTimeout(() => inputRef.current?.focus(), 50); }}>
          <span>+</span> Add a card <kbd>⌘K</kbd>
        </button>
      ) : (
        <form className="quick-add__form" onSubmit={submit}>
          <input
            ref={inputRef}
            value={val}
            onChange={(e) => setVal(e.target.value)}
            placeholder={placeholder}
            onBlur={() => { if (!val) setOpen(false); }}
          />
          <button type="submit">Add</button>
        </form>
      )}
    </div>
  );
};

// ============================================================
// UNDO TOAST
// ============================================================

const Toast = ({ message, onUndo, onDismiss }) => {
  useEffect(() => {
    const t = setTimeout(() => onDismiss(), 5500);
    return () => clearTimeout(t);
  }, [onDismiss]);
  return (
    <div className="toast">
      <span className="toast__msg">{message}</span>
      <button className="toast__undo" onClick={onUndo}>Undo</button>
      <button className="toast__close" onClick={onDismiss} aria-label="Close">×</button>
    </div>
  );
};

// ============================================================
// SHIPPED CHIP
// ============================================================

const ShippedChip = ({ chip }) => (
  <a className="shipped-chip" href={chip.href} target={chip.href.startsWith('http') ? '_blank' : undefined} rel="noreferrer">
    <div className="shipped-chip__dot" />

    <div className="shipped-chip__meta">{chip.meta}</div>
    <div className="shipped-chip__arrow">↗</div>
  </a>
);

// Export to window
Object.assign(window, {
  Badge, LinkChip, DashRead, DraftReply, Card, CompactRow,
  EmptyState, ConfidenceTag, StatusChangeBadge, MomentMarker,
  SectionHeader, DraggableList, QuickAdd, Toast, ShippedChip,
  CheckCircle, DragHandle,
});

</script>

<script type="text/babel">
/* global React, DAILY_DASH_DATA, Badge, DraggableList */
const { useState, useMemo, useEffect } = React;

const prettyTime = (t) => {
  if (t.includes(' ')) return t;
  const [h, m] = t.split(':').map(Number);
  const ampm = h >= 12 ? 'pm' : 'am';
  const hh = ((h + 11) % 12) + 1;
  return m === 0 ? `${hh}${ampm}` : `${hh}:${String(m).padStart(2, '0')}${ampm}`;
};
const evMinutes = (ev) => {
  if (ev.start.includes(' ')) return 9999;
  const [h, m] = ev.start.split(':').map(Number);
  return h * 60 + m;
};
const evEndMinutes = (ev) => {
  if (ev.end && !ev.end.includes(' ')) {
    const [h, m] = ev.end.split(':').map(Number);
    return h * 60 + m;
  }
  return evMinutes(ev) + 30;
};
const orderedIds = (allIds, savedOrder) => {
  if (!savedOrder || !savedOrder.length) return allIds;
  const set = new Set(allIds);
  const ordered = savedOrder.filter((id) => set.has(id));
  const remaining = allIds.filter((id) => !ordered.includes(id));
  return [...ordered, ...remaining];
};
const getNowMinutes = () => {
  const now = new Date();
  const m = now.getHours() * 60 + now.getMinutes();
  if (m < 8 * 60 || m > 17 * 60) return 10 * 60 + 30;
  return m;
};

// ============================================================

];

function buildBoardSeed() {
  const all = [
    ...D.launches.map(c => ({ ...c, _src: 'launch' })),
    ...D.watching_p0.map(c => ({ ...c, _src: 'p0' })),
    ...D.planning.map(c => ({ ...c, _src: 'planning' })),

  const seed = {};
  all.forEach(c => {
    const labels = (c.badges || []).map(b => (b.label || '').toLowerCase());

  });

  const noteProps = (id) => ({
    note: (notes || {})[id],
    onNote,
    noteTs: (notesTs || {})[id],
  });
  const [openEv, setOpenEv] = useState(null);
  const [showPast, setShowPast] = useState(false);
  const [collapsedBuckets, setCollapsedBuckets] = useState({});
  const nowMin = getNowMinutes();
  const toggleBucket = (id) => setCollapsedBuckets(s => ({ ...s, [id]: !s[id] }));

  if (calTab === 'today') {
    if (D.today_calendar.length === 0) {
      return (
        <div>
          <div className="m1-toolbar"><CalendarTabs active={calTab} onChange={onTab} /></div>
          <window.EmptyState tool="calendar" valueProp="See today's events bucketed by morning / midday / afternoon, with linked transcripts and prep notes." allClearText="No events today." />
        </div>
      );
    }
    const buckets = { morning: [], midday: [], afternoon: [] };
    const hidden = [];
    D.today_calendar.forEach(ev => {
      if (!showPast && evEndMinutes(ev) <= nowMin) { hidden.push(ev); return; }
      const h = parseInt(ev.start.split(':')[0], 10);
      if (h < 12) buckets.morning.push(ev);
      else if (h < 14) buckets.midday.push(ev);
      else buckets.afternoon.push(ev);
    });
    const meta = [
      { id: 'morning',   label: 'Morning',   tone: 'persimmon' },
      { id: 'midday',    label: 'Midday',    tone: 'mustard' },
      { id: 'afternoon', label: 'Afternoon', tone: 'plum' },
    ];

    return (
      <div>
        <div className="m1-toolbar">
          <CalendarTabs active={calTab} onChange={onTab} />
          {hidden.length > 0 && (
            <button className="cta cta--ghost" onClick={() => setShowPast(!showPast)}>
              {showPast ? `Hide ${hidden.length} completed` : `Show ${hidden.length} completed`}
            </button>
          )}
          {showPast && hidden.length === 0 && (
            <button className="cta cta--ghost" onClick={() => setShowPast(false)}>Hide completed</button>
          )}
        </div>
        <div className="m3-stream">
          {meta.map(bm => {
            const isCollapsed = collapsedBuckets[bm.id];
            return (
              <div key={bm.id} className={`m3-bucket m3-bucket--${bm.tone} ${isCollapsed ? 'is-collapsed' : ''}`}>
                <button className="m3-bucket__head" onClick={() => toggleBucket(bm.id)}>
                  <div className="m3-bucket__label">{bm.label}</div>
                  <div className="m3-bucket__hint">{isCollapsed ? `+ ${buckets[bm.id].length}` : '— hide'}</div>
                </button>
                <div className="m3-bucket__body">
                  {buckets[bm.id].length === 0 ? (
                    <div className="m3-bucket__empty">— open block —</div>
                  ) : (
                    buckets[bm.id].map(ev => (
                      <EventRow key={ev.id} event={ev}
                        expanded={openEv === ev.id}
                        onToggle={() => setOpenEv(openEv === ev.id ? null : ev.id)}
                        {...noteProps(ev.id)} />
                    ))
                  )}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  const events = calTab === 'tomorrow' ? D.tomorrow_calendar : D.restweek_calendar;
  return (
    <div>
      <div className="m1-toolbar">
        <CalendarTabs active={calTab} onChange={onTab} />
      </div>
      <div className="m-agenda">
        {events.map(ev => (
          <EventRow key={ev.id} event={ev}
            expanded={openEv === ev.id}
            onToggle={() => setOpenEv(openEv === ev.id ? null : ev.id)}
            {...noteProps(ev.id)} />
        ))}
      </div>
    </div>
  );
}

function CalendarTabs({ active, onChange }) {
  const tabs = [
    { id: 'today',     label: 'Today',         count: D.today_calendar.length },
    { id: 'tomorrow',  label: 'Tomorrow',      count: D.tomorrow_calendar.length },
    { id: 'restweek',  label: 'Rest of week',  count: D.restweek_calendar.length },
  ];
  return (
    <div className="m-subtabs">
      {tabs.map(t => (
        <button key={t.id}
          className={`m-subtab ${active === t.id ? 'is-active' : ''}`}
          onClick={() => onChange(t.id)}>
          <span>{t.label}</span>
          <span className="m-subtab__count">{t.count}</span>
        </button>
      ))}
    </div>
  );
}

// ============================================================
// QUEUE CARDS — CTAs use copper (primary) + sage (slack-green)
// ============================================================
function CardLite({ card, done, onCheck, note, onNote, noteTs }) {
  const [open, setOpen] = React.useState(false);
  const hasDetail = !!(card.eyebrow || card.sub || (card.links && card.links.length) || onNote);
  return (
    <div className={`m-card m-card--${card.kind || 'default'} ${done ? 'is-done' : ''} ${open ? 'is-open' : ''}`}>
      <div
        className="m-card__head"
        role="button"
        tabIndex={0}
        onClick={() => hasDetail && setOpen(o => !o)}
        onKeyDown={(e) => { if (hasDetail && (e.key === 'Enter' || e.key === ' ')) { e.preventDefault(); setOpen(o => !o); } }}>
        <button
          type="button"
          className={`m-check ${done ? 'is-done' : ''}`}
          onClick={(e) => { e.stopPropagation(); onCheck(card.id); }}>
          {done && <svg width="10" height="10" viewBox="0 0 11 11"><path d="M2 5.5L4.5 8L9 3" stroke="currentColor" strokeWidth="1.6" fill="none" strokeLinecap="round"/></svg>}
        </button>
        <div className="m-card__when">
          <div className="m-card__when-main">{card.when}</div>
          {card.whenSub && <div className="m-card__when-sub">{card.whenSub}</div>}
        </div>
        <div className="m-card__body">
          <div className="m-card__title">{card.title}</div>
        </div>
        <div className="m-card__meta">
          <div className="m-card__badges">
            {(card.badges || []).map((b, i) => <Badge key={i} {...b} />)}
          </div>
        </div>
        {hasDetail && <span className="m-card__chev">{open ? '–' : '+'}</span>}
      </div>
      {open && hasDetail && (
        <div className="m-card__detail" onClick={(e) => e.stopPropagation()}>
          {card.eyebrow && <div className="m-card__eyebrow">{card.eyebrow}</div>}
          {card.sub && <div className="m-card__sub">{card.sub}</div>}
          {card.links && (
            <div className="m-card__links">
              {card.links.map((l, i) => {
                // Match calendar card styling: first link copper (primary), rest sage (green)
                const cls = i === 0 ? 'cta--primary' : 'cta--slack';
                return <a key={i} className={`cta ${cls}`} href={l.href}>{l.label} ↗</a>;
              })}
            </div>
          )}
          {onNote && <CardNote cardId={card.id} note={note} onNote={onNote} ts={noteTs} />}
        </div>
      )}
    </div>
  );
}

// ============================================================
// CARD NOTE — toggleable textarea on any expanded card surface.
// Claude Code reads state.notes on the next /daily-dash refresh (requires localhost mode).
// Free-form text; intent is classified during refresh ("pausing this", "this never happened",
// "killed", or free-form context → appended to the underlying task notes).
// ============================================================
function CardNote({ cardId, note, onNote, ts }) {
  const [open, setOpen] = React.useState(Boolean(note));
  const [val, setVal] = React.useState(note || '');
  React.useEffect(() => { setVal(note || ''); }, [note]);
  const hasNote = Boolean(note);
  const commit = (v) => { setVal(v); onNote && onNote(cardId, v); };
  const clear = (e) => { e && e.stopPropagation(); commit(''); setOpen(false); };
  const tsLabel = ts ? new Date(ts).toLocaleString(undefined, { month:'short', day:'numeric', hour:'numeric', minute:'2-digit' }) : '';
  return (
    <div className="m-cardnote" onClick={(e) => e.stopPropagation()}>
      {!open ? (
        <button
          type="button"
          className={`m-cardnote__toggle ${hasNote ? 'has-note' : ''}`}
          onClick={(e) => { e.stopPropagation(); setOpen(true); }}
          title={hasNote ? 'Note picked up on the next /daily-dash refresh' : 'Leave a note for the next /daily-dash refresh to pick up'}>
          {hasNote && <span className="m-cardnote__dot" aria-hidden />}
          {hasNote ? 'note' : '+ leave a note'}
        </button>
      ) : (
        <div className="m-cardnote__wrap">
          <span className="m-cardnote__label">Note · picked up on the next /daily-dash refresh</span>
          <textarea
            className="m-cardnote__ta"
            value={val}
            placeholder='e.g. "pausing this for now", "this meeting never happened", "killed - not pursuing", or any free-form context'
            onChange={(e) => commit(e.target.value)}
            onClick={(e) => e.stopPropagation()}
          />
          <div className="m-cardnote__meta">
            <span>{tsLabel ? `saved ${tsLabel}` : 'auto-saves as you type'}</span>
            {hasNote && <button type="button" className="m-cardnote__clear" onClick={clear}>clear note</button>}
          </div>
        </div>
      )}
    </div>
  );
}

function ViewMore({ count, onClick, expanded }) {
  return (
    <button className="cta cta--ghost m-viewmore" onClick={onClick}>
      {expanded ? '— show less' : `+ show ${count} more`}
    </button>
  );
}

// ============================================================
// LIFECYCLE BOARD — Active/Shipped tabs, hide columns, tints, drag
// ============================================================
function LifecycleBoard({ state, setState }) {
  const seed = useMemo(() => buildBoardSeed(), []);
  const [boardTab, setBoardTab] = useState('active');
  const [openCard, setOpenCard] = useState(null);
  const [dragId, setDragId] = useState(null);
  const [overCol, setOverCol] = useState(null);
  const [collapsed, setCollapsed] = useState({});
  const [hidden, setHidden] = useState({}); // { colKey: true }

  // Per-card note handler — writes to state.notes / state.notesTs (picked up on next /daily-dash refresh).
  const onNote = (id, v) => {
    setState(s => {
      const nextNotes = { ...(s.notes || {}) };
      const nextTs = { ...(s.notesTs || {}) };
      if (v == null || v === '') { delete nextNotes[id]; delete nextTs[id]; }
      else { nextNotes[id] = v; nextTs[id] = new Date().toISOString(); }
      return { ...s, notes: nextNotes, notesTs: nextTs };
    });
  };

  const moves = state.boardMoves || {};
  const colOf = (id) => moves[id] || seed.seed[id] || 'inprogress';

  const colsForTab = boardTab === 'active' ? ACTIVE_COLS : SHIPPED_COLS;
  const visibleCols = colsForTab.filter(c => !hidden[c.key]);
  const hiddenCols = colsForTab.filter(c => hidden[c.key]);

  const grouped = {};
  colsForTab.forEach(c => { grouped[c.key] = []; });
  seed.items.forEach(it => {
    const k = colOf(it.id);
    if (grouped[k] !== undefined) grouped[k].push(it);
  });

  const moveItem = (id, col) => {
    setState(s => ({ ...s, boardMoves: { ...(s.boardMoves || {}), [id]: col } }));
  };
  const toggleHide = (key) => setHidden(s => ({ ...s, [key]: !s[key] }));

  const totalActive = ACTIVE_COLS.reduce((n, c) => n + (grouped[c.key]?.length || 0), 0);
  const totalShipped = grouped['shipped']?.length || 0;

  return (
    <div>
      <div className="m-kanban-toolbar">
        <div className="m-subtabs">
          <button className={`m-subtab ${boardTab === 'active' ? 'is-active' : ''}`}
            onClick={() => setBoardTab('active')}>
            <span>Active</span>
            <span className="m-subtab__count">{totalActive}</span>
          </button>
          <button className={`m-subtab ${boardTab === 'shipped' ? 'is-active' : ''}`}
            onClick={() => setBoardTab('shipped')}>
            <span>Shipped</span>
            <span className="m-subtab__count">{totalShipped}</span>
          </button>
        </div>
        {hiddenCols.length > 0 && (
          <div className="m-kanban-toolbar__hidden">
            <span className="m-kanban-toolbar__hidden-h">Hidden:</span>
            {hiddenCols.map(c => (
              <button key={c.key} className="m-kcol-restore" onClick={() => toggleHide(c.key)}>
                + {c.label}
              </button>
            ))}
          </div>
        )}
      </div>

      <div className="m-kanban-scroll">
        <div className="m-kanban">
          {visibleCols.map(col => {
            const items = grouped[col.key] || [];
            const showAll = collapsed[col.key];
            const visible = showAll ? items : items.slice(0, 4);
            return (
              <div key={col.key}
                className={`m-kcol m-kcol--${col.tone} ${overCol === col.key ? 'is-drop' : ''}`}
                onDragOver={(e) => { e.preventDefault(); setOverCol(col.key); }}
                onDragLeave={() => setOverCol(null)}
                onDrop={(e) => { e.preventDefault(); if (dragId) moveItem(dragId, col.key); setDragId(null); setOverCol(null); }}>
                <div className="m-kcol__head">
                  <span className="m-kcol__label">{col.label}</span>
                  <div style={{display:'flex', alignItems:'baseline', gap:'8px'}}>
                    <span className="m-kcol__count">{items.length}</span>
                    <button className="m-kcol__hide" onClick={() => toggleHide(col.key)} title="Hide column">×</button>
                  </div>
                </div>
                <div className="m-kcol__body">
                  {visible.map(item => {
                    const isOpen = openCard === item.id;
                    const tint = tintOfCard(item);
                    return (
                      <div key={item.id}
                        className={`m-kcard ${tint ? 'm-kcard--' + tint : ''} ${isOpen ? 'is-open' : ''} ${dragId === item.id ? 'is-dragging' : ''}`}
                        draggable
                        onDragStart={(e) => { setDragId(item.id); e.dataTransfer.effectAllowed = 'move'; }}
                        onDragEnd={() => { setDragId(null); setOverCol(null); }}>
                        <button className="m-kcard__head" onClick={() => setOpenCard(isOpen ? null : item.id)}>
                          <span className="m-kcard__grip" aria-hidden>⋮⋮</span>
                          <span className="m-kcard__title">{item.title}</span>
                          <span className="m-kcard__chev">{isOpen ? '–' : '+'}</span>
                        </button>
                        {isOpen && (() => {
                          // Mirror FollowupRow fallback: prefer item.links, else wrap a bare item.href into a one-element links array.
                          const kctaLinks = Array.isArray(item.links) && item.links.length
                            ? item.links
                            : (item.href ? [{
                                kind: item.href.startsWith('obsidian://') ? 'obsidian'
                                    : item.href.includes('slack.com') ? 'slack'
                                    : 'notion',
                                label: item.href.startsWith('obsidian://') ? 'Open in Obsidian'
                                    : item.href.includes('slack.com') ? 'Open Slack thread'
                                    : 'Open in Notion',
                                href: item.href
                              }] : []);
                          const hasAnyDetail = item.eyebrow || item.sub || item.read || kctaLinks.length;
                          return (
                            <div className="m-kcard__detail">
                              {item.eyebrow && <div className="m-kcard__eyebrow">{item.eyebrow}</div>}
                              {item.sub && <p className="m-kcard__sub">{item.sub}</p>}
                              {item.read && (
                                <div className="m-kcard__read">
                                  <span className="m-kcard__read-h">The read</span>
                                  <p>{item.read}</p>
                                </div>
                              )}
                              {!hasAnyDetail && (
                                <p style={{margin:'0 0 10px 0', fontSize:12, color:'var(--ink-muted)', fontStyle:'italic'}}>No linked context yet — add detail on the next /daily-dash refresh.</p>
                              )}
                              <div className="m-kcard__links">
                                {kctaLinks.map((l, i) => {
                                  const isWorkItem = l.kind === 'obsidian' || /work item/i.test(l.label);
                                  return (
                                    <a key={i} className={`cta ${isWorkItem ? 'cta--plum' : 'cta--primary'}`} href={l.href} target="_blank" rel="noreferrer">
                                      {isWorkItem ? 'Open Work Item ↗' : l.label + ' ↗'}
                                    </a>
                                  );
                                })}
                              </div>
                              <CardNote cardId={item.id} note={(state.notes || {})[item.id]} onNote={onNote} ts={(state.notesTs || {})[item.id]} />
                            </div>
                          );
                        })()}
                      </div>
                    );
                  })}
                  {items.length > 4 && (
                    <button className="m-kcol__more" onClick={() => setCollapsed({ ...collapsed, [col.key]: !showAll })}>
                      {showAll ? '— less' : `+ ${items.length - 4} more`}
                    </button>
                  )}
                  {items.length === 0 && <div className="m-kcol__empty">— empty —</div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// TODAY MOCKUP 1
// ============================================================
function TodayMockup1({ state, setState, cardProps, onReorder }) {
  const [calTab, setCalTab] = useState('today');
  const [qTab, setQTab] = useState('plate');
  const [qMore, setQMore] = useState(false);
  const [fMore, setFMore] = useState(false);
  const [openF, setOpenF] = useState(null);

  const plateOrder = orderedIds(D.today_hero.map(c => c.id), state.orders.hero);
  const plateById = Object.fromEntries(D.today_hero.map(c => [c.id, c]));
  const plateIds = plateOrder.filter(id => plateById[id] && !state.dismissed[id]);
  const overdueIds = orderedIds(D.overdue.map(c => c.id), state.orders.overdue).filter(id => !state.dismissed[id]);
  const overdueById = Object.fromEntries(D.overdue.map(c => [c.id, c]));
  const slackIds = orderedIds(D.slack.map(c => c.id), state.orders.slack).filter(id => !state.dismissed[id]);
  const slackById = Object.fromEntries(D.slack.map(c => [c.id, c]));
  const queues = {
    plate:   { label: 'On plate', ids: plateIds,   by: plateById,   key: 'hero' },
    overdue: { label: 'Overdue',  ids: overdueIds, by: overdueById, key: 'overdue' },
    slack:   { label: 'Slack',    ids: slackIds,   by: slackById,   key: 'slack' },
  };
  const aq = queues[qTab];
  const visibleQ = qMore ? aq.ids : aq.ids.slice(0, 4);

  // Today shows only refresh-picked focus items (see meta.todayFollowupIds). Full triage lives on the Follow-Ups page.
  const todayPicks = (D.meta && D.meta.todayFollowupIds) || [];
  const followById = Object.fromEntries(D.followups.map(c => [c.id, c]));
  const followIds = orderedIds(
    todayPicks.length ? todayPicks.filter(id => followById[id]) : D.followups.map(c => c.id).slice(0, 5),
    state.orders.followups
  ).filter(id => !state.dismissed[id]);
  const visibleF = followIds;

  const totalQueueOpen = (plateIds.filter(i => !state.done[i]).length
    + overdueIds.filter(i => !state.done[i]).length
    + slackIds.filter(i => !state.done[i]).length);

  return (
    <div className="m1">
      <PulseCard />

      <CollapsibleBlock title="Day stream" sub="schedule" color="schedule"
        defaultOpen={false}
        count={D.today_calendar.length}>
        <DayStream calTab={calTab} onTab={setCalTab} notes={cardProps.notes || state.notes} onNote={cardProps.onNote} notesTs={state.notesTs} />
      </CollapsibleBlock>

      <CollapsibleBlock title="Queue" color="queue"
        defaultOpen={true}
        count={totalQueueOpen}>
        <div className="m1-toolbar">
          <div className="m-subtabs">
            {Object.entries(queues).map(([id, q]) => (
              <button key={id}
                className={`m-subtab ${qTab === id ? 'is-active' : ''}`}
                onClick={() => { setQTab(id); setQMore(false); }}>
                <span>{q.label}</span>
                <span className="m-subtab__count">{q.ids.filter(i => !state.done[i]).length}</span>
              </button>
            ))}
          </div>
        </div>
        <div className="m-queuelist">
          {aq.ids.length === 0 ? (
            qTab === 'slack'
              ? <window.EmptyState tool="slack" valueProp="Surface threads where you're awaited across your channels, DMs, and @mentions." allClearText="Inbox zero across your channels. Nice." />
              : <div className="m-empty">Inbox zero. Nice.</div>
          ) : (
            <window.DraggableList
              ids={visibleQ}
              onReorder={onReorder(aq.key)}
              renderItem={(id) => (
                <CardLite
                  card={aq.by[id]}
                  done={state.done[id]}
                  onCheck={cardProps.onCheck}
                  note={(cardProps.notes || state.notes || {})[id]}
                  onNote={cardProps.onNote}
                  noteTs={(state.notesTs || {})[id]}
                />
              )}
            />
          )}
        </div>
        {aq.ids.length > 4 && (
          <ViewMore count={aq.ids.length - 4} expanded={qMore} onClick={() => setQMore(!qMore)} />
        )}
      </CollapsibleBlock>

      <CollapsibleBlock title="Today's follow-ups" color="follow"
        sub={`${followIds.length ? "Today's picks for focus — full triage on Follow-Ups tab" : "Nothing surfaced — open Follow-Ups for the full list"}`}
        defaultOpen={true}
        count={followIds.filter(i => !state.done[i]).length}>
        <div className="m-followlist">
          {visibleF.map(id => (
            <FollowupRow
              key={id}
              item={followById[id]}
              isDone={!!state.done[id]}
              onCheck={() => cardProps.onCheck(id)}
              isOpen={openF === id}
              onToggle={() => setOpenF(openF === id ? null : id)}
              note={(cardProps.notes || state.notes || {})[id]}
              onNote={cardProps.onNote}
              noteTs={(state.notesTs || {})[id]}
            />
          ))}
        </div>
      </CollapsibleBlock>

      <CollapsibleBlock title="Lifecycle OS — this week" color="board"
        defaultOpen={false}
        sub="drag cards · click to expand">
        <LifecycleBoard state={state} setState={setState} />
      </CollapsibleBlock>
    </div>
  );
}

Object.assign(window, { TodayMockup1, CardLite, FollowupRow, CardNote });

</script>
